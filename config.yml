# ─────────────────────────────────────────────────────────────
#  Paramètres du pipeline
# ─────────────────────────────────────────────────────────────
parametres:
  surface_reference_m2: 50       # Surface de référence pour les calculs de rendement
  charges_locatives_pct: 25.0    # % charges estimées (taxe foncière, copro, vacance)
  frais_acquisition_pct: 8.0     # % frais de notaire (immobilier ancien)
  cache_ttl_jours: 7             # Durée de validité du cache (jours)
  annees_dvf: 2                  # Fenêtre historique DVF pour le calcul du prix m²
  rayon_transports_m: 800        # Rayon en mètres pour le comptage des arrêts TC

# ─────────────────────────────────────────────────────────────
#  Pondération du score investisseur (doit sommer à 1.0)
# ─────────────────────────────────────────────────────────────
scoring:
  poids_rendement: 0.50           # Rendement brut estimé
  poids_tension_locative: 0.30    # Part de locataires (proxy tension)
  poids_transports: 0.20          # Score accessibilité TC

# ─────────────────────────────────────────────────────────────
#  Scraping des annonces immobilières
# ─────────────────────────────────────────────────────────────
annonces:
  actif: true
  interval_heures: 12           # Fréquence de scraping
  sources:
    - pap
    - leboncoin
    - bienici

  # Filtres par défaut (modifiables aussi depuis le dashboard)
  types:                        # appartement | maison | les deux
    - appartement
    - maison
  surface_min_m2: 20
  surface_max_m2: 120           # null = pas de limite
  prix_max: 500000
  nb_pieces_min: 1

  # Seuil d'alerte "sous-coté" (delta vs prix DVF commune)
  seuil_sous_cote_pct: -10      # -10% = annonce 10% sous le prix moyen DVF
